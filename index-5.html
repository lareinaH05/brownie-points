<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---------- Game config ----------

const GAME_PATH = "games/lrn0308-k7q2x9fw3m/shared"; // secret random path for your game data
const DB_ROOT = "https://brownie-points-e287c-default-rtdb.asia-southeast1.firebasedatabase.app";
const REST_URL = DB_ROOT + "/" + GAME_PATH + ".json";
const ADMIN_PIN = "0308"; // only this code opens Game Master
const ROLE_KEY = "bp-role-v1";     // personal (this device): remembers which side you are
const SEEN_KEY = "bp-seen-v1";     // personal (this device): seen notifications

const todayStr = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
};
const isToday = (ts) => ts && new Date(ts).toDateString() === new Date().toDateString();

// Daily Q&A: one question per day, XP scales with level (LV1=5, LV2=15, LV3=25…)
const QUIZ_BANK = [
  "What made you smile today?",
  "What's one thing I did recently that you loved?",
  "If we could teleport anywhere right now, where would you take me?",
  "What song reminds you of me?",
  "What's your favorite memory of us so far?",
  "What food do you think I'd never say no to?",
  "What's something small I do that you secretly enjoy?",
  "If today had a title like a movie, what would it be?",
  "What's one thing you want us to try together?",
  "Coffee date or midnight snack run — which suits us better and why?",
  "What did you eat today? Rate it out of 10.",
  "What's one thing you're proud of this week?",
  "If I was a dessert, what would I be?",
  "What's the best part of your day so far?",
  "Which of my quirks did you notice first?",
  "What's a place you want to take me before the year ends?",
  "What's something new you learned recently?",
  "Describe me in exactly three words.",
  "What's a tiny thing that made today better?",
  "If we had a couples' theme song, what would it be?",
  "What are you looking forward to this week?",
  "What's your current favorite photo of us (or of me 😏)?",
  "One thing you'd do if you had a totally free day tomorrow?",
  "What's a smell that reminds you of me?",
  "What would we name our future pet?",
  "What's the last thing that made you laugh out loud?",
  "Which meal should I learn to cook for you?",
  "What's one goal you have this month?",
  "If you could replay one of our days together, which one?",
  "What's something you've been meaning to tell me?",
];
const quizForToday = () => {
  const t = todayStr();
  let h = 0;
  for (let i = 0; i < t.length; i++) h = (h * 31 + t.charCodeAt(i)) >>> 0;
  return QUIZ_BANK[h % QUIZ_BANK.length];
};
const quizXPForLevel = (lv) => 5 + (lv - 1) * 10;

// Lucky wheel: spin unlocked by clearing 4+ quests in one day (hidden quests don't count)
const WHEEL_PRIZES = [
  { kind: "xp", amount: 10, label: "+10 XP", weight: 30 },
  { kind: "xp", amount: 15, label: "+15 XP", weight: 30 },
  { kind: "xp", amount: 25, label: "+25 XP", weight: 22 },
  { kind: "xp", amount: 50, label: "+50 XP", weight: 12 },   // second rarest
  { kind: "pic", label: "Titty pic voucher 🌶️", weight: 6 }, // rarest jackpot
];
const pickWheelPrize = () => {
  const total = WHEEL_PRIZES.reduce((a, p) => a + p.weight, 0);
  let r = Math.random() * total;
  for (let i = 0; i < WHEEL_PRIZES.length; i++) {
    r -= WHEEL_PRIZES[i].weight;
    if (r <= 0) return i;
  }
  return 0;
};

// Firebase strips empty arrays/objects, so re-fill them on read
const normalizeShared = (data) => {
  const base = { ...DEFAULT_SHARED, ...(data || {}) };
  ["tasks", "penalties", "achievements", "hiddenTasks", "log", "requests", "proposals", "wishes", "coupons"].forEach(
    (k) => { if (!Array.isArray(base[k])) base[k] = Object.values(base[k] || {}); }
  );
  ["taskCounts", "claimed", "rewards"].forEach((k) => { if (!base[k]) base[k] = {}; });
  ["reverseQuests", "seasonHistory"].forEach(
    (k) => { if (!Array.isArray(base[k])) base[k] = Object.values(base[k] || {}); }
  );
  if (!base.season || !base.season.number) base.season = { number: 1 };
  if (!base.wheel) base.wheel = { lastSpinDate: null };
  base.boost = !!base.boost;
  if (!base.dailyQA) base.dailyQA = null;
  return base;
};

const DEFAULT_SHARED = {
  pin: null,
  tasks: DEFAULT_TASKS,
  penalties: DEFAULT_PENALTIES,
  rewards: DEFAULT_REWARDS,
  achievements: DEFAULT_ACHIEVEMENTS,
  hiddenTasks: [
    { id: "h1", name: "Remember the little things I say", xp: 25 },
    { id: "h2", name: "Small sweet gesture in person", xp: 20 },
    { id: "h3", name: "Own up to a mistake", xp: 40 },
    { id: "h4", name: "listen and make changes", xp: 30 },
    { id: "h5", name: "pay for me", xp: 15 },
    { id: "h6", name: "ask how's my day", xp: 5 },
  ],
  taskCounts: {},
  totalXP: 0,
  claimed: {},
  log: [],
  requests: [],   // {id, taskId, name, xp, time, status: pending|approved|declined}
  proposals: [],  // {id, name, time, status: pending|approved|declined}
  wishes: [],     // {id, text, time, status: pending|approved|declined, assignedTo}
  coupons: [],    // {id, questName, reward, useDate, time, ts, status: won|pending|fulfilled, revealed}
  dailyQA: null,  // {date, question, answer, xp, time, ts}
  wheel: { lastSpinDate: null },
  boost: false,   // 1.5x XP event toggle (Game Master)
  reverseQuests: [], // {id, name, time, ts, status: open|accepted|done|declined, doneTs, doneTime}
  season: { number: 1 },
  seasonHistory: [], // {number, level, totalXP, time, ts}
};

function levelFromXP(xp) {
  let lv = 1;
  for (let i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (xp >= LEVEL_THRESHOLDS[i]) lv = i + 1;
  }
  return lv;
}

const uid = () => Math.random().toString(36).slice(2, 9);
const now = () =>
  new Date().toLocaleString("en-US", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });

// ---------- Style tokens ----------
const C = {
  bg: "#241f4e",
  panel: "#fff8e7",
  ink: "#2b2350",
  pink: "#ff6b81",
  gold: "#ffc945",
  mint: "#59d6a2",
  red: "#e84855",
  dim: "#8a84b8",
  blue: "#5aa9e6",      // daily Q&A
  blueBg: "#eaf4ff",
  purple: "#7c6ff0",    // Apply button
};
const pixelFont = "'Press Start 2P', monospace";
const bodyFont = "'Outfit', sans-serif";

function BrowniePoints() {
  const [shared, setShared] = useState(null);
  const [role, setRole] = useState(null); // 'player' | 'admin' | null
  const [booted, setBooted] = useState(false);
  const [tab, setTab] = useState("tasks");
  const [popup, setPopup] = useState(null); // {type:'up'|'down'|'achieve', ...}
  const [flash, setFlash] = useState(null);
  const [saveTime, setSaveTime] = useState(null);
  const [saveError, setSaveError] = useState(false);
  const [syncing, setSyncing] = useState(false);

  // forms
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [newName, setNewName] = useState("");
  const [newXP, setNewXP] = useState("10");
  const [newPName, setNewPName] = useState("");
  const [newPXP, setNewPXP] = useState("30");
  const [achTaskId, setAchTaskId] = useState("");
  const [achTarget, setAchTarget] = useState("10");
  const [achReward, setAchReward] = useState("");
  const [wishText, setWishText] = useState("");
  const [proposalText, setProposalText] = useState("");
  const [proposalXP, setProposalXP] = useState({}); // proposalId -> xp string
  const [assignPick, setAssignPick] = useState({}); // wishId -> level
  const [showBackup, setShowBackup] = useState(false);
  const [importText, setImportText] = useState("");
  const [hidName, setHidName] = useState("");
  const [hidXP, setHidXP] = useState("40");
  const [seenIds, setSeenIds] = useState([]);
  const [quizAnswer, setQuizAnswer] = useState("");
  const [wheelSpin, setWheelSpin] = useState(null); // null | {deg} while spinning
  const [reverseText, setReverseText] = useState("");
  const [useCouponTarget, setUseCouponTarget] = useState(null); // a "won" coupon being booked
  const [useCouponDate, setUseCouponDate] = useState("");
  const sharedRef = useRef(null);

  const persistSeen = (ids) => {
    setSeenIds(ids);
    try { localStorage.setItem(SEEN_KEY, JSON.stringify(ids.slice(-300))); } catch (e) { /* fine */ }
  };

  // ---------- Storage (Firebase RTDB: REST-first with realtime upgrade) ----------
  const roleRef = useRef(null);
  const sdkLive = useRef(false); // becomes true once the realtime channel delivers data

  const applyIncoming = (raw) => {
    const next = normalizeShared(raw);
    const prev = sharedRef.current;
    if (prev && roleRef.current === "player") {
      const prevHidden = prev.log.filter((l) => l.hidden).length;
      const newHidden = next.log.filter((l) => l.hidden).length;
      if (newHidden > prevHidden) setPopup({ type: "hidden" });
    }
    sharedRef.current = next;
    setShared(next);
    setBooted(true);
    setSaveError(false);
  };

  const restLoad = async () => {
    const r = await fetch(REST_URL);
    if (!r.ok) throw new Error("rest " + r.status);
    return r.json();
  };

  const loadShared = async () => {
    setSyncing(true);
    try {
      applyIncoming(await restLoad());
    } catch (e) { /* keep whatever we have */ }
    setSyncing(false);
  };

  const saveShared = async (next) => {
    sharedRef.current = next;
    setShared(next);
    const stamp = () => {
      setSaveError(false);
      setSaveTime(new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" }));
    };
    try {
      if (window.db && sdkLive.current) {
        await window.db.ref(GAME_PATH).set(next);
      } else {
        const r = await fetch(REST_URL, { method: "PUT", body: JSON.stringify(next) });
        if (!r.ok) throw new Error("rest put " + r.status);
      }
      stamp();
    } catch (e) {
      // one more try with the other channel
      try {
        const r = await fetch(REST_URL, { method: "PUT", body: JSON.stringify(next) });
        if (!r.ok) throw new Error("rest put " + r.status);
        stamp();
      } catch (e2) {
        setSaveError(true);
      }
    }
  };

  useEffect(() => {
    // restore this device's role + seen notifications
    try {
      const r = localStorage.getItem(ROLE_KEY);
      if (r) { setRole(r); roleRef.current = r; }
    } catch (e) { /* fine */ }
    try {
      const seen = localStorage.getItem(SEEN_KEY);
      if (seen) setSeenIds(JSON.parse(seen));
    } catch (e) { /* fine */ }

    // 1) boot instantly over REST (we know this channel works)
    restLoad()
      .then((data) => { if (!sdkLive.current) applyIncoming(data); })
      .catch(() => {
        if (!sharedRef.current) {
          sharedRef.current = { ...DEFAULT_SHARED };
          setShared(sharedRef.current);
          setBooted(true);
          setSaveError(true);
        }
      });

    // 2) try to upgrade to the realtime channel
    let ref = null;
    const onValue = (snap) => {
      sdkLive.current = true;
      applyIncoming(snap.val());
    };
    try {
      if (window.db) {
        ref = window.db.ref(GAME_PATH);
        ref.on("value", onValue, () => { /* realtime denied; polling covers us */ });
      }
    } catch (e) { /* polling covers us */ }

    // 3) fallback: if realtime never comes up, poll every 5s so both sides stay in sync
    const iv = setInterval(() => {
      if (!sdkLive.current) {
        restLoad().then((data) => applyIncoming(data)).catch(() => {});
      }
    }, 5000);

    return () => {
      clearInterval(iv);
      if (ref) ref.off("value", onValue);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const persistRole = (r) => {
    setRole(r);
    roleRef.current = r;
    try {
      if (r) localStorage.setItem(ROLE_KEY, r);
      else localStorage.removeItem(ROLE_KEY);
    } catch (e) { /* fine */ }
  };

  // ---------- Derived ----------
  const s = shared || DEFAULT_SHARED;
  const level = levelFromXP(s.totalXP);
  const curBase = LEVEL_THRESHOLDS[level - 1];
  const nextGoal = level < MAX_LEVEL ? LEVEL_THRESHOLDS[level] : null;
  const progress = nextGoal ? (s.totalXP - curBase) / (nextGoal - curBase) : 1;
  const segments = 12;
  const filled = Math.round(progress * segments);
  const pendingRequests = s.requests.filter((r) => r.status === "pending");
  const pendingProposals = s.proposals.filter((p) => p.status === "pending");
  const pendingWishes = s.wishes.filter((w) => w.status === "pending");
  const pendingCoupons = (s.coupons || []).filter((c) => c.status === "pending");
  const openReverseCount = (s.reverseQuests || []).filter((q) => q.status === "open").length;
  const inboxCount = pendingRequests.length + pendingProposals.length + pendingWishes.length + pendingCoupons.length + openReverseCount;

  // player notifications: request results + hidden quest clears
  const playerNotifs = [
    ...s.requests
      .filter((r) => r.status !== "pending")
      .map((r) => ({
        id: "req-" + r.id,
        ts: r.ts || 0,
        time: r.time,
        icon: r.status === "approved" ? "✅" : "🚫",
        text:
          r.status === "approved"
            ? `Approved: ${r.name} (+${r.xp} XP)`
            : `Declined: ${r.name}`,
      })),
    ...s.log
      .filter((l) => l.hidden)
      .map((l) => ({
        id: "hid-" + l.id,
        ts: l.ts || 0,
        time: l.time,
        icon: "✨",
        text: `You cleared a hidden quest! (+${l.xp} XP)`,
      })),
    ...(s.coupons || [])
      .filter((c) => c.status === "fulfilled")
      .map((c) => ({
        id: "cpn-" + c.id,
        ts: c.fulfilledTs || c.ts || 0,
        time: c.fulfilledTime || c.time,
        icon: "🎉",
        text: `Coupon fulfilled: ${c.reward}`,
      })),
  ].sort((a, b) => b.ts - a.ts);
  // reverse quest completions also notify the player
  const reverseNotifs = (s.reverseQuests || [])
    .filter((q) => q.status === "done")
    .map((q) => ({
      id: "rev-" + q.id,
      ts: q.doneTs || q.ts || 0,
      time: q.doneTime || q.time,
      icon: "💝",
      text: `She completed your quest: ${q.name}`,
    }));
  const allPlayerNotifs = [...playerNotifs, ...reverseNotifs].sort((a, b) => b.ts - a.ts);
  const unseenCount = allPlayerNotifs.filter((n) => !seenIds.includes(n.id)).length;

  // 1.5x XP event
  const boostOn = !!s.boost;
  const effXP = (xp) => (boostOn ? Math.round(xp * 1.5) : xp);

  // daily Q&A
  const quizQuestion = quizForToday();
  const quizDone = s.dailyQA && s.dailyQA.date === todayStr();
  const quizXP = effXP(quizXPForLevel(level));

  // lucky wheel: 4+ non-hidden quest completions today unlock one spin per day
  const questsToday = s.log.filter((l) => l.xp > 0 && l.taskId && !l.hidden && isToday(l.ts)).length;
  const spinUsedToday = s.wheel && s.wheel.lastSpinDate === todayStr();
  const canSpin = questsToday >= 4 && !spinUsedToday;

  const openReverse = (s.reverseQuests || []).filter((q) => q.status === "open" || q.status === "accepted");

  // weekly report: highlight of the week + the day he earned the most XP
  const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const weekEntries = s.log.filter((l) => l.xp > 0 && l.ts && l.ts >= weekAgo);
  const weekTotal = weekEntries.reduce((a, l) => a + l.xp, 0);
  const weekHighlight = weekEntries.reduce((best, l) => (!best || l.xp > best.xp ? l : best), null);
  const dayTotals = {};
  weekEntries.forEach((l) => {
    const k = new Date(l.ts).toLocaleDateString("en-US", { weekday: "short", month: "numeric", day: "numeric" });
    dayTotals[k] = (dayTotals[k] || 0) + l.xp;
  });
  const bestDay = Object.entries(dayTotals).reduce((best, cur) => (!best || cur[1] > best[1] ? cur : best), null);

  // player: opening the inbox marks everything as seen
  useEffect(() => {
    if (booted && role === "player" && tab === "inbox") {
      const allIds = allPlayerNotifs.map((n) => n.id);
      if (allIds.some((id) => !seenIds.includes(id))) {
        persistSeen(Array.from(new Set([...seenIds, ...allIds])));
      }
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [tab, booted, role, allPlayerNotifs.length]);

  // ---------- Player actions ----------
  const [applyTarget, setApplyTarget] = useState(null); // task being applied for
  const [applyReason, setApplyReason] = useState("");

  const openApply = (task) => {
    setApplyReason("");
    setApplyTarget(task);
  };

  const confirmApply = () => {
    if (!applyTarget) return;
    const req = {
      id: uid(),
      taskId: applyTarget.id,
      name: applyTarget.name,
      xp: effXP(applyTarget.xp),
      reason: applyReason.trim() || null,
      time: now(),
      ts: Date.now(),
      status: "pending",
    };
    saveShared({ ...s, requests: [req, ...s.requests].slice(0, 100) });
    setFlash("apply-" + applyTarget.id);
    setTimeout(() => setFlash(null), 900);
    setApplyTarget(null);
    setApplyReason("");
  };

  const submitWish = () => {
    if (!wishText.trim()) return;
    const wish = { id: uid(), text: wishText.trim(), time: now(), ts: Date.now(), status: "pending", assignedTo: null };
    saveShared({ ...s, wishes: [wish, ...s.wishes].slice(0, 100) });
    setWishText("");
  };

  const submitProposal = () => {
    if (!proposalText.trim()) return;
    const p = { id: uid(), name: proposalText.trim(), time: now(), ts: Date.now(), status: "pending" };
    saveShared({ ...s, proposals: [p, ...s.proposals].slice(0, 100) });
    setProposalText("");
  };

  const withdrawRequest = (id) =>
    saveShared({ ...s, requests: s.requests.filter((r) => !(r.id === id && r.status === "pending")) });

  const withdrawProposal = (id) =>
    saveShared({ ...s, proposals: s.proposals.filter((p) => !(p.id === id && p.status === "pending")) });

  // player: claiming a trophy = booking a coupon
  const [claimTarget, setClaimTarget] = useState(null); // achievement being claimed
  const [claimDate, setClaimDate] = useState("");

  const openClaim = (a) => {
    setClaimDate("");
    setClaimTarget(a);
  };

  const confirmClaim = () => {
    if (!claimTarget || !claimDate) return;
    const task = s.tasks.find((t) => t.id === claimTarget.taskId);
    const coupon = {
      id: uid(),
      achievementId: claimTarget.id,
      questName: `${task ? task.name : "Trophy"} ×${claimTarget.target}`,
      reward: claimTarget.reward,
      useDate: claimDate,
      time: now(),
      ts: Date.now(),
      status: "pending",
    };
    saveShared({
      ...s,
      coupons: [coupon, ...(s.coupons || [])].slice(0, 100),
      achievements: s.achievements.map((a) =>
        a.id === claimTarget.id ? { ...a, timesEarned: (a.timesEarned || 0) + 1 } : a
      ),
    });
    setClaimTarget(null);
    setClaimDate("");
  };

  const submitQuiz = () => {
    if (!quizAnswer.trim() || quizDone) return;
    const xp = quizXP;
    const granted = grantXP(s, "Daily Q&A ✍️", xp, null);
    saveShared({
      ...s,
      ...granted,
      dailyQA: { date: todayStr(), question: quizQuestion, answer: quizAnswer.trim(), xp, time: now(), ts: Date.now() },
    });
    setQuizAnswer("");
    setPopup({ type: "gain", title: "DAILY Q&A!", text: `Answer received — you've automatically gained +${xp} XP!!!` });
  };

  const spinWheel = () => {
    if (!canSpin || wheelSpin) return;
    const idx = pickWheelPrize();
    const prize = WHEEL_PRIZES[idx];
    // spin animation: land on the chosen slice
    const slice = 360 / WHEEL_PRIZES.length;
    const deg = 5 * 360 + (360 - (idx * slice + slice / 2));
    setWheelSpin({ deg });
    setTimeout(() => {
      setWheelSpin(null);
      if (prize.kind === "xp") {
        const granted = grantXP(s, "Lucky wheel 🎰", prize.amount, null);
        granted.log = [{ ...granted.log[0], wheel: true }, ...granted.log.slice(1)];
        saveShared({ ...s, ...granted, wheel: { lastSpinDate: todayStr() } });
        setPopup({ type: "gain", title: "LUCKY WHEEL!", text: `You've automatically gained +${prize.amount} XP!!!` });
      } else {
        const coupon = {
          id: uid(),
          questName: "Lucky wheel 🎰",
          reward: prize.label,
          revealed: true,
          useDate: null,
          time: now(),
          ts: Date.now(),
          status: "won",
        };
        saveShared({ ...s, coupons: [coupon, ...(s.coupons || [])].slice(0, 100), wheel: { lastSpinDate: todayStr() } });
        setPopup({ type: "gain", title: "JACKPOT!", text: `You won: ${prize.label} — it's in your Rewards wallet. Pick a date and claim it 😏` });
      }
    }, 2700);
  };

  const openUseCoupon = (c) => {
    setUseCouponDate("");
    setUseCouponTarget(c);
  };

  const confirmUseCoupon = () => {
    if (!useCouponTarget || !useCouponDate) return;
    saveShared({
      ...s,
      coupons: (s.coupons || []).map((x) =>
        x.id === useCouponTarget.id ? { ...x, status: "pending", useDate: useCouponDate } : x
      ),
    });
    setUseCouponTarget(null);
    setUseCouponDate("");
  };

  const addReverseQuest = () => {
    if (!reverseText.trim()) return;
    const q = { id: uid(), name: reverseText.trim(), time: now(), ts: Date.now(), status: "open" };
    saveShared({ ...s, reverseQuests: [q, ...(s.reverseQuests || [])].slice(0, 50) });
    setReverseText("");
  };

  const setReverseStatus = (id, status) =>
    saveShared({
      ...s,
      reverseQuests: (s.reverseQuests || []).map((q) =>
        q.id === id
          ? { ...q, status, ...(status === "done" ? { doneTs: Date.now(), doneTime: now() } : {}) }
          : q
      ),
    });

  const deleteReverse = (id) =>
    saveShared({ ...s, reverseQuests: (s.reverseQuests || []).filter((q) => q.id !== id) });

  const toggleBoost = () => saveShared({ ...s, boost: !s.boost });

  const endSeason = () => {
    if (!window.confirm(`End Season ${s.season.number}? A season badge is saved with his current level & XP, and the new season starts with a -200 XP entry fee. Everything else stays.`)) return;
    const newTotal = Math.max(0, s.totalXP - 200);
    const entry = {
      id: uid(), taskId: null, name: `Season ${s.season.number + 1} entry fee 🏁`,
      xp: -(s.totalXP - newTotal), time: now(), ts: Date.now(),
    };
    saveShared({
      ...s,
      seasonHistory: [
        ...(s.seasonHistory || []),
        { number: s.season.number, level, totalXP: s.totalXP, time: now(), ts: Date.now() },
      ],
      season: { number: s.season.number + 1 },
      totalXP: newTotal,
      log: [entry, ...s.log].slice(0, 200),
    });
  };

  const fulfillCoupon = (c) =>
    saveShared({
      ...s,
      coupons: (s.coupons || []).map((x) =>
        x.id === c.id ? { ...x, status: "fulfilled", fulfilledTs: Date.now(), fulfilledTime: now() } : x
      ),
    });

  // ---------- Admin actions ----------
  const grantXP = (base, name, xp, taskId, hidden = false) => {
    // returns next-state pieces + fires popup
    const before = levelFromXP(base.totalXP);
    const newTotal = base.totalXP + xp;
    const after = levelFromXP(newTotal);
    const newCounts = taskId
      ? { ...base.taskCounts, [taskId]: (base.taskCounts[taskId] || 0) + 1 }
      : base.taskCounts;
    const entry = { id: uid(), taskId: taskId || null, name, xp, time: now(), ts: Date.now(), hidden };
    const newCount = taskId ? newCounts[taskId] : 0;
    const hitAch = taskId
      ? base.achievements.find(
          (a) => a.taskId === taskId && newCount - (a.timesEarned || 0) * a.target === a.target
        )
      : null;
    let newCoupons = null;
    if (after > before) {
      setPopup({ type: "up", level: after, reward: base.rewards[after] || "Reward TBD — stay tuned 👀" });
      const wins = [];
      for (let lv = before + 1; lv <= after; lv++) {
        wins.push({
          id: uid(),
          questName: `LV${lv} unlocked ⭐`,
          reward: base.rewards[lv] || "Reward TBD — stay tuned 👀",
          revealed: true,
          useDate: null,
          time: now(),
          ts: Date.now(),
          status: "won",
        });
      }
      newCoupons = [...wins, ...(base.coupons || [])].slice(0, 100);
    } else if (hitAch) {
      setPopup({ type: "achieve", name: `${name} ×${hitAch.target}`, reward: hitAch.reward });
    }
    return { totalXP: newTotal, taskCounts: newCounts, log: [entry, ...base.log].slice(0, 200), ...(newCoupons ? { coupons: newCoupons } : {}) };  };

  const addHiddenTask = () => {
    const xp = parseInt(hidXP, 10);
    if (!hidName.trim() || !xp || xp <= 0) return;
    saveShared({ ...s, hiddenTasks: [...(s.hiddenTasks || []), { id: uid(), name: hidName.trim(), xp }] });
    setHidName("");
    setHidXP("40");
  };

  const deleteHiddenTask = (id) =>
    saveShared({ ...s, hiddenTasks: (s.hiddenTasks || []).filter((t) => t.id !== id) });

  const completeHiddenTask = (t) => {
    const granted = grantXP(s, t.name, t.xp, null, true);
    saveShared({ ...s, ...granted });
    setFlash("hid-" + t.id);
    setTimeout(() => setFlash(null), 700);
  };

  const approveRequest = (req) => {
    const granted = grantXP(s, req.name, req.xp, req.taskId);
    saveShared({
      ...s,
      ...granted,
      requests: s.requests.map((r) => (r.id === req.id ? { ...r, status: "approved" } : r)),
    });
  };

  const declineRequest = (req) =>
    saveShared({ ...s, requests: s.requests.map((r) => (r.id === req.id ? { ...r, status: "declined" } : r)) });

  const completeTaskDirect = (task) => {
    const granted = grantXP(s, task.name, effXP(task.xp), task.id);
    saveShared({ ...s, ...granted });
    setFlash(task.id);
    setTimeout(() => setFlash(null), 700);
  };

  const applyPenalty = (p) => {
    const before = levelFromXP(s.totalXP);
    const newTotal = Math.max(0, s.totalXP - p.xp);
    const after = levelFromXP(newTotal);
    const entry = { id: uid(), taskId: null, name: p.name, xp: -(s.totalXP - newTotal), time: now(), ts: Date.now() };
    saveShared({ ...s, totalXP: newTotal, log: [entry, ...s.log].slice(0, 200) });
    setFlash("pen-" + p.id);
    setTimeout(() => setFlash(null), 700);
    if (after < before) setPopup({ type: "down", level: after });
  };

  const deleteLog = (entry) => {
    const next = {
      ...s,
      totalXP: Math.max(0, s.totalXP - entry.xp),
      taskCounts:
        entry.taskId && entry.xp > 0
          ? { ...s.taskCounts, [entry.taskId]: Math.max(0, (s.taskCounts[entry.taskId] || 0) - 1) }
          : s.taskCounts,
      // undoing a Lucky wheel result re-arms today's spin, as if it never happened
      wheel: entry.wheel ? { lastSpinDate: null } : s.wheel,
      log: s.log.filter((l) => l.id !== entry.id),
    };
    saveShared(next);
  };

  // GM can void a wheel-won coupon: removes it and re-arms today's spin
  const voidCoupon = (c) => {
    const fromWheel = (c.questName || "").includes("Lucky wheel");
    saveShared({
      ...s,
      coupons: (s.coupons || []).filter((x) => x.id !== c.id),
      wheel: fromWheel ? { lastSpinDate: null } : s.wheel,
    });
  };

  const undoLast = () => {
    if (s.log.length > 0) deleteLog(s.log[0]);
  };

  const addTask = () => {
    const xp = parseInt(newXP, 10);
    if (!newName.trim() || !xp || xp <= 0) return;
    saveShared({ ...s, tasks: [...s.tasks, { id: uid(), name: newName.trim(), xp }] });
    setNewName("");
    setNewXP("10");
  };

  const deleteTask = (id) => saveShared({ ...s, tasks: s.tasks.filter((t) => t.id !== id) });

  const addPenalty = () => {
    const xp = parseInt(newPXP, 10);
    if (!newPName.trim() || !xp || xp <= 0) return;
    saveShared({ ...s, penalties: [...s.penalties, { id: uid(), name: newPName.trim(), xp }] });
    setNewPName("");
    setNewPXP("30");
  };

  const deletePenalty = (id) => saveShared({ ...s, penalties: s.penalties.filter((p) => p.id !== id) });

  const setReward = (lv, text) => saveShared({ ...s, rewards: { ...s.rewards, [lv]: text } });

  const claimReward = (lv) => saveShared({ ...s, claimed: { ...s.claimed, [lv]: true } });

  const addAchievement = () => {
    const target = parseInt(achTarget, 10);
    if (!achTaskId || !target || target <= 0 || !achReward.trim()) return;
    saveShared({
      ...s,
      achievements: [...s.achievements, { id: uid(), taskId: achTaskId, target, reward: achReward.trim(), claimed: false }],
    });
    setAchTaskId("");
    setAchTarget("10");
    setAchReward("");
  };

  const deleteAchievement = (id) =>
    saveShared({ ...s, achievements: s.achievements.filter((a) => a.id !== id) });

  const approveWish = (wish) => {
    const lv = parseInt(assignPick[wish.id], 10);
    if (!lv) return;
    saveShared({
      ...s,
      rewards: { ...s.rewards, [lv]: wish.text },
      wishes: s.wishes.map((w) => (w.id === wish.id ? { ...w, status: "approved", assignedTo: `LV${lv}` } : w)),
    });
  };

  const declineWish = (wish) =>
    saveShared({ ...s, wishes: s.wishes.map((w) => (w.id === wish.id ? { ...w, status: "declined" } : w)) });

  const deleteWish = (id) => saveShared({ ...s, wishes: s.wishes.filter((w) => w.id !== id) });

  const approveProposal = (p) => {
    const xp = parseInt(proposalXP[p.id], 10);
    if (!xp || xp <= 0) return;
    saveShared({
      ...s,
      tasks: [...s.tasks, { id: uid(), name: p.name, xp }],
      proposals: s.proposals.map((x) => (x.id === p.id ? { ...x, status: "approved" } : x)),
    });
  };

  const declineProposal = (p) =>
    saveShared({ ...s, proposals: s.proposals.map((x) => (x.id === p.id ? { ...x, status: "declined" } : x)) });

  const deleteProposal = (id) => saveShared({ ...s, proposals: s.proposals.filter((p) => p.id !== id) });

  const resetAll = () => {
    if (window.confirm("Reset everything? XP, logs, requests and wishes will all go back to zero!")) {
      saveShared({ ...DEFAULT_SHARED, pin: s.pin });
    }
  };

  // ---------- UI bits ----------
  const panelStyle = {
    background: C.panel,
    border: `4px solid ${C.ink}`,
    borderRadius: 12,
    boxShadow: `6px 6px 0 rgba(0,0,0,0.35)`,
  };

  const btn = (bg, color = "#fff", extra = {}) => ({
    background: bg, color, border: `3px solid ${C.ink}`, borderRadius: 8,
    padding: "8px 14px", fontWeight: 900, fontSize: 13, cursor: "pointer",
    fontFamily: bodyFont, boxShadow: "2px 2px 0 rgba(0,0,0,.3)", ...extra,
  });

  const inputStyle = {
    padding: "10px 12px", fontSize: 14, fontWeight: 500,
    border: `3px solid ${C.ink}`, borderRadius: 8, fontFamily: bodyFont,
  };

  const StatusTag = ({ status }) =>
    status === "pending" ? (
      <span style={{ fontSize: 10, fontFamily: pixelFont, color: C.gold, whiteSpace: "nowrap" }}>PENDING</span>
    ) : status === "approved" ? (
      <span style={{ fontSize: 13 }}>✅</span>
    ) : (
      <span style={{ fontSize: 13 }}>🚫</span>
    );

  const fonts = (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;700;900&display=swap');
      @keyframes pop { 0%{transform:scale(.5);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
      @keyframes floatUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-28px);opacity:0} }
      @keyframes blink { 50%{opacity:.3} }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
      input:focus, button:focus-visible, select:focus { outline: 3px solid ${C.gold}; outline-offset: 2px; }
    `}</style>
  );

  const shell = (children) => (
    <div
      style={{
        minHeight: "100vh", background: C.bg,
        backgroundImage: "radial-gradient(rgba(255,255,255,0.07) 1.5px, transparent 1.5px)",
        backgroundSize: "22px 22px",
        fontFamily: bodyFont, color: C.ink, padding: "20px 12px 48px",
      }}
    >
      {fonts}
      <div style={{ maxWidth: 520, margin: "0 auto" }}>{children}</div>
    </div>
  );

  // ---------- Boot / role select ----------
  if (!booted || !shared) {
    return shell(
      <div style={{ textAlign: "center", paddingTop: 120 }}>
        <div style={{ color: C.gold, fontFamily: pixelFont, fontSize: 14 }}>LOADING...</div>
      </div>
    );
  }

  if (!role) {
    return shell(
      <div style={{ paddingTop: 40 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontFamily: pixelFont, color: C.gold, fontSize: 10, letterSpacing: 2, marginBottom: 10 }}>
            ★ EARN IT ★
          </div>
          <h1 style={{ margin: 0, color: "#fff", fontSize: 24, fontWeight: 900, fontFamily: pixelFont, textShadow: "3px 3px 0 rgba(0,0,0,.4)", lineHeight: 1.4 }}>
            BROWNIE<br />POINTS
          </h1>
        </div>
        <div style={{ ...panelStyle, padding: 20 }}>
          <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 14, textAlign: "center" }}>Who's playing?</div>
          <button
            onClick={() => persistRole("player")}
            style={{ ...btn(C.pink), width: "100%", padding: "14px 0", fontSize: 16, marginBottom: 10 }}
          >
            🎮 I'm the Player
          </button>
          <div style={{ fontSize: 12, color: C.dim, fontWeight: 500, textAlign: "center", marginBottom: 18 }}>
            Do quests, earn XP, level up, unlock mystery rewards
          </div>
          <div style={{ borderTop: `3px dashed ${C.dim}`, paddingTop: 16 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 8, textAlign: "center" }}>
              👑 Game Master — enter PIN
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              <input
                value={pinInput}
                onChange={(e) => { setPinInput(e.target.value.replace(/[^0-9]/g, "").slice(0, 4)); setPinError(false); }}
                inputMode="numeric"
                placeholder="PIN"
                style={{ ...inputStyle, width: 90, textAlign: "center", fontWeight: 900, letterSpacing: 4 }}
              />
              <button
                onClick={() => {
                  if (pinInput === ADMIN_PIN) {
                    persistRole("admin");
                  } else {
                    setPinError(true);
                  }
                  setPinInput("");
                }}
                style={btn(C.ink)}
              >
                Enter
              </button>
            </div>
            {pinError && (
              <div style={{ textAlign: "center", color: C.red, fontWeight: 700, fontSize: 12, marginTop: 8 }}>
                Wrong PIN, try again
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  const isAdmin = role === "admin";

  // tab sets per role
  const tabs = isAdmin
    ? [["tasks", "Quests"], ["ach", "Trophies"], ["rewards", "Rewards"], ["inbox", inboxCount > 0 ? `Inbox·${inboxCount}` : "Inbox"], ["log", "Log"]]
    : [["tasks", "Quests"], ["ach", "Trophies"], ["rewards", "Rewards"], ["wishes", "Wishes"], ["inbox", unseenCount > 0 ? `Inbox·${unseenCount}` : "Inbox"], ["log", "Log"]];
  const activeTab = tabs.some(([id]) => id === tab) ? tab : "tasks";

  return shell(
    <>
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontFamily: pixelFont, color: C.gold, fontSize: 10, letterSpacing: 2, marginBottom: 10 }}>
          {isAdmin ? "★ GAME MASTER ★" : "★ EARN IT ★"}
        </div>
        <h1 style={{ margin: 0, color: "#fff", fontSize: 24, fontWeight: 900, fontFamily: pixelFont, textShadow: "3px 3px 0 rgba(0,0,0,.4)", lineHeight: 1.4 }}>
          BROWNIE<br />POINTS
        </h1>
        <div style={{ marginTop: 10, display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
          <span style={{ fontFamily: pixelFont, fontSize: 8, color: C.panel, background: "rgba(255,255,255,.12)", border: `2px solid rgba(255,255,255,.25)`, borderRadius: 6, padding: "5px 8px" }}>
            SEASON {s.season.number}
          </span>
          {boostOn && (
            <span style={{ fontFamily: pixelFont, fontSize: 8, color: C.ink, background: C.gold, border: `2px solid ${C.ink}`, borderRadius: 6, padding: "5px 8px", animation: "blink 1.2s step-end infinite" }}>
              ⚡ 1.5x XP EVENT!
            </span>
          )}
        </div>
      </div>

      {/* Status HUD */}
      <div style={{ ...panelStyle, padding: 18, marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div
            style={{
              width: 74, height: 74, flexShrink: 0,
              background: C.pink, border: `4px solid ${C.ink}`, borderRadius: 12,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff",
            }}
          >
            <div style={{ fontFamily: pixelFont, fontSize: 9 }}>LV</div>
            <div style={{ fontFamily: pixelFont, fontSize: 24, marginTop: 4 }}>{level}</div>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
              <span style={{ fontWeight: 900, fontSize: 15 }}>
                {level >= MAX_LEVEL ? "Max level 👑" : `To LV${level + 1}`}
              </span>
              <span style={{ fontFamily: pixelFont, fontSize: 10, color: C.ink }}>
                {nextGoal ? `${s.totalXP}/${nextGoal}` : `${s.totalXP} XP`}
              </span>
            </div>
            <div style={{ display: "flex", gap: 3, background: C.ink, padding: 4, borderRadius: 8 }}>
              {Array.from({ length: segments }).map((_, i) => (
                <div
                  key={i}
                  style={{
                    flex: 1, height: 16, borderRadius: 3,
                    background: i < filled ? C.gold : "rgba(255,255,255,0.12)",
                    boxShadow: i < filled ? "inset 0 -4px 0 rgba(0,0,0,.25)" : "none",
                    transition: "background .3s",
                  }}
                />
              ))}
            </div>
            <div style={{ fontSize: 12, color: C.dim, marginTop: 6, fontWeight: 500 }}>
              Total {s.totalXP} XP · {s.log.length} entries logged
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <button
            onClick={loadShared}
            style={{
              flex: 1, background: "transparent", border: `2px dashed ${C.dim}`, borderRadius: 8,
              padding: "7px 10px", fontWeight: 700, fontSize: 12, color: C.ink, cursor: "pointer", fontFamily: bodyFont,
            }}
          >
            {syncing ? "Syncing…" : "● Live · tap to refresh"}
          </button>
          {isAdmin && s.log.length > 0 && (
            <button
              onClick={undoLast}
              style={{
                flex: 2, background: "transparent", border: `2px dashed ${C.dim}`, borderRadius: 8,
                padding: "7px 10px", fontWeight: 700, fontSize: 12, color: C.ink, cursor: "pointer", fontFamily: bodyFont,
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}
            >
              ↩ Undo: {s.log[0].name} ({s.log[0].xp > 0 ? "+" : ""}{s.log[0].xp})
            </button>
          )}
        </div>
      </div>

      {/* Tabs */}

                  <input

                      <div

                          fontFamily: pixelFont, fontSize: 10, color: C.gold,
                          animation: "floatUp .7s ease-out forwards", textShadow: "1px 1px 0 rgba(0,0,0,.3)",

                      >
                        +{t.xp}

                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 10 }}>

              </div>
            </>

          {/* Player: penalty rules, read-only */}
          {!isAdmin && s.penalties.length > 0 && (
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: `3px solid ${C.red}` }}>
              <div style={{ fontWeight: 900, fontSize: 14, color: C.red, marginBottom: 8 }}>⚠ DON'T</div>
              {s.penalties.map((p) => (
                <div
                  key={p.id}
                  style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", marginBottom: 6,
                    background: "#fff", border: `2px solid ${C.red}`, borderRadius: 8,

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{p.name}</div>

                      <div style={{ fontSize: 11, color: C.dim, fontWeight: 500, marginTop: 2 }}>({p.note})</div>

                  </div>
                  <div style={{ fontFamily: pixelFont, fontSize: 9, color: C.red }}>-{p.xp}XP</div>

          {/* Player: hidden quest teaser */}

                marginTop: 14, padding: "10px 12px", border: `3px dashed ${C.gold}`, borderRadius: 10,

              </div>
            </div>
          )}
        </div>
      )}

      {/* ======== TROPHIES ======== */}
      {activeTab === "ach" && (
        <div style={{ ...panelStyle, padding: 16 }}>
          <div style={{ fontSize: 13, color: C.dim, fontWeight: 700, marginBottom: 12 }}>
            Repeat the same quest enough times to unlock its own reward 🏆
          </div>
          {(s.seasonHistory || []).length > 0 && (
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
              {(s.seasonHistory || []).map((h) => (
                <span
                  key={h.number}
                  style={{
                    fontFamily: pixelFont, fontSize: 8, background: "#fffbe8", border: `2px solid ${C.gold}`,
                    borderRadius: 6, padding: "5px 7px", color: C.ink,
                  }}
                >
                  🏅 S{h.number} · LV{h.level}
                </span>
              ))}
            </div>
          )}
          {s.achievements.length === 0 && (
            <div style={{ textAlign: "center", padding: 20, color: C.dim, fontWeight: 500 }}>
              No trophies yet!
            </div>
          )}
          {s.achievements.map((a) => {
            const task = s.tasks.find((t) => t.id === a.taskId);
            const raw = s.taskCounts[a.taskId] || 0;
            const eff = raw - (a.timesEarned || 0) * a.target;
            const count = Math.min(Math.max(eff, 0), a.target);
            const done = eff >= a.target;
            const earned = a.timesEarned || 0;
            return (
              <div
                key={a.id}
                style={{
                  padding: "12px 12px", marginBottom: 10,
                  background: done ? "#fffbe8" : "#fff",
                  border: `3px solid ${done ? C.gold : C.ink}`, borderRadius: 10,
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 900, fontSize: 14 }}>
                      {task ? task.name : "(quest deleted)"} ×{a.target}
                      {earned > 0 && (
                        <span style={{ fontSize: 11, color: C.gold, fontWeight: 900 }}> · earned ×{earned} 🏅</span>
                      )}
                    </div>
                    <div style={{ fontSize: 12, color: C.dim, fontWeight: 500, marginTop: 2 }}>
                      Reward: {isAdmin ? a.reward : "??? 🎁"} · repeats after claiming
                    </div>
                  </div>
                  <div style={{ fontFamily: pixelFont, fontSize: 9, color: done ? C.gold : C.dim, whiteSpace: "nowrap" }}>
                    {count}/{a.target}
                  </div>

                    isAdmin ? (
                      <span style={{ fontSize: 10, fontWeight: 900, color: C.gold, whiteSpace: "nowrap" }}>
                        UNLOCKED · his move
                      </span>
                    ) : (
                      <button onClick={() => openClaim(a)} style={btn(C.gold, C.ink, { padding: "6px 10px", whiteSpace: "nowrap" })}>
                        Claim
                      </button>
                    )
                  ) : (
                    <span style={{ fontSize: 14 }}>🔒</span>
                  )}
                  {isAdmin && (

          {weekEntries.length > 0 && (
            <div style={{ marginBottom: 14, padding: "12px 12px", border: `3px solid ${C.ink}`, borderRadius: 10, background: "#f3f0ff" }}>
              <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 6 }}>📊 Weekly report</div>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>
                ⭐ Highlight of the week:{" "}
                <span style={{ color: "#5b4bc4" }}>
                  {weekHighlight.hidden && !isAdmin ? "Hidden quest ✨" : weekHighlight.name} (+{weekHighlight.xp} XP)
                </span>
              </div>
              {bestDay && (
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>
                  🔥 Biggest XP day: <span style={{ color: "#5b4bc4" }}>{bestDay[0]} · +{bestDay[1]} XP</span>
                </div>
              )}
              <div style={{ fontSize: 12, color: C.dim, fontWeight: 500 }}>
                Total this week: +{weekTotal} XP across {weekEntries.length} entries
              </div>
            </div>
          )}
          {s.log.length === 0 && (
            <div style={{ textAlign: "center", padding: 24, color: C.dim, fontWeight: 500 }}>
              Nothing logged yet — complete your first quest! ⚔️
            </div>
          )}
          {s.log.map((e) => (
            <div
              key={e.id}
              style={{
                display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", marginBottom: 6,
                background: "#fff", border: `2px solid ${C.ink}`, borderRadius: 10,
              }}
            >
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>
                  {e.hidden && !isAdmin ? "Hidden quest ✨" : e.name}
                </div>
                <div style={{ fontSize: 11, color: C.dim }}>{e.time}</div>
              </div>
              <div style={{ fontFamily: pixelFont, fontSize: 9, color: e.xp < 0 ? C.red : C.pink }}>
                {e.xp < 0 ? "" : "+"}{e.xp}XP
              </div>
              {isAdmin && (
                <button
                  onClick={() => deleteLog(e)}
                  aria-label="Delete this entry"
                  style={{ background: "transparent", border: "none", color: C.dim, fontSize: 15, cursor: "pointer" }}
                >
                  ✕
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Footer */}
      <div style={{ textAlign: "center", marginTop: 20, color: "rgba(255,255,255,.45)", fontSize: 11 }}>
        {saveError
          ? "⚠ Save failing — changes only live on this screen for now"
          : saveTime
          ? `Saved ✓ ${saveTime}`
          : "Progress autosaves · pick up where you left off"}
        <div style={{ marginTop: 6 }}>
          <button
            onClick={() => persistRole(null)}
            style={{
              background: "transparent", border: "none", color: "rgba(255,255,255,.45)",
              fontSize: 11, cursor: "pointer", textDecoration: "underline", fontFamily: bodyFont,
            }}
          >
            Switch role ({isAdmin ? "Game Master" : "Player"})
          </button>
        </div>
      </div>

      {/* Apply confirm dialog */}
      {applyTarget && (
        <div
          style={{
            position: "fixed", inset: 0, background: "rgba(20,15,50,.8)",
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 60,
          }}
          onClick={() => setApplyTarget(null)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ ...panelStyle, padding: "22px 20px", maxWidth: 340, width: "100%", animation: "pop .35s ease-out" }}
          >
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 4 }}>Apply: {applyTarget.name}</div>
            <div style={{ fontFamily: pixelFont, fontSize: 10, color: C.pink, marginBottom: 12 }}>
              +{applyTarget.xp}XP
            </div>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.dim, marginBottom: 6 }}>
              Add a note for her (optional)
            </div>
            <textarea
              value={applyReason}
              onChange={(e) => setApplyReason(e.target.value)}
              placeholder="e.g. Told you about the schedule change right away today"
              rows={3}
              style={{
                width: "100%", boxSizing: "border-box", padding: 10, fontSize: 14, fontWeight: 500,
                border: `3px solid ${C.ink}`, borderRadius: 8, fontFamily: bodyFont, resize: "none",
              }}
            />
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button
                onClick={() => setApplyTarget(null)}
                style={btn("#fff", C.dim, { flex: 1, borderColor: C.dim, boxShadow: "none" })}
              >
                Cancel
              </button>
              <button onClick={confirmApply} style={btn(C.purple, "#fff", { flex: 2 })}>
                Confirm & send
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Wheel spinning overlay */}
      {wheelSpin && (
        <div
          style={{
            position: "fixed", inset: 0, background: "rgba(20,15,50,.85)",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 70,
          }}
        >
          <div style={{ position: "relative", width: 260, height: 260 }}>
            <div style={{ position: "absolute", top: -16, left: "50%", transform: "translateX(-50%)", fontSize: 30, zIndex: 3, filter: "drop-shadow(0 2px 2px rgba(0,0,0,.5))" }}>🔻</div>
            <div
              style={{
                position: "absolute", inset: 0, borderRadius: "50%", border: `6px solid ${C.gold}`,
                background: `conic-gradient(${C.pink} 0deg 72deg, ${C.gold} 72deg 144deg, ${C.mint} 144deg 216deg, ${C.purple} 216deg 288deg, ${C.red} 288deg 360deg)`,
                transform: `rotate(${wheelSpin.deg}deg)`,
                transition: "transform 2.5s cubic-bezier(.15,.9,.25,1)",
                boxShadow: "0 0 40px rgba(255,201,69,.4)",
              }}
            >
              {WHEEL_PRIZES.map((p, i) => (
                <div
                  key={i}
                  style={{
                    position: "absolute", inset: 0,
                    transform: `rotate(${i * 72 + 36}deg)`,
                    pointerEvents: "none",
                  }}
                >
                  <div
                    style={{
                      position: "absolute", top: 16, left: "50%", transform: "translateX(-50%)",
                      fontFamily: pixelFont, fontSize: p.kind === "pic" ? 8 : 10, color: "#fff",
                      textShadow: "1px 1px 0 rgba(0,0,0,.6)", whiteSpace: "nowrap", textAlign: "center",
                    }}
                  >
                    {p.kind === "pic" ? "JACKPOT" : `+${p.amount}XP`}
                    {p.kind === "pic" && <div style={{ fontSize: 14, marginTop: 2 }}>🌶️</div>}
                  </div>
                </div>
              ))}
            </div>
            <div
              style={{
                position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
                width: 56, height: 56, borderRadius: "50%", background: C.ink, border: `4px solid ${C.gold}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 24, zIndex: 2, pointerEvents: "none",
              }}
            >
              🎰
            </div>
          </div>
          <div style={{ marginTop: 20, fontFamily: pixelFont, fontSize: 12, color: C.gold, animation: "blink 1s step-end infinite" }}>
            SPINNING...
          </div>
        </div>
      )}

      {/* Use won coupon dialog */}
      {useCouponTarget && (
        <div
          style={{
            position: "fixed", inset: 0, background: "rgba(20,15,50,.8)",
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 60,
          }}
          onClick={() => setUseCouponTarget(null)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ ...panelStyle, padding: "22px 20px", maxWidth: 340, width: "100%", animation: "pop .35s ease-out" }}
          >
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 4 }}>🎟 Use: {useCouponTarget.reward}</div>
            <div style={{ fontSize: 12, color: C.dim, fontWeight: 500, marginBottom: 12 }}>
              Pick the date you want to cash this in — it goes straight to her inbox 😏
            </div>
            <input
              type="date"
              value={useCouponDate}
              onChange={(e) => setUseCouponDate(e.target.value)}
              style={{
                width: "100%", boxSizing: "border-box", padding: 10, fontSize: 15, fontWeight: 700,
                border: `3px solid ${C.ink}`, borderRadius: 8, fontFamily: bodyFont, background: "#fff",
              }}
            />
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button
                onClick={() => setUseCouponTarget(null)}
                style={btn("#fff", C.dim, { flex: 1, borderColor: C.dim, boxShadow: "none" })}
              >
                Cancel
              </button>
              <button onClick={confirmUseCoupon} style={btn(useCouponDate ? C.gold : C.dim, C.ink, { flex: 2 })}>
                Send it!
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Claim coupon dialog */}
      {claimTarget && (
        <div
          style={{
            position: "fixed", inset: 0, background: "rgba(20,15,50,.8)",
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 60,
          }}
          onClick={() => setClaimTarget(null)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ ...panelStyle, padding: "22px 20px", maxWidth: 340, width: "100%", animation: "pop .35s ease-out" }}
          >
            <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 4 }}>🎟 Claim your coupon</div>
            <div style={{ fontSize: 12, color: C.dim, fontWeight: 500, marginBottom: 12 }}>
              The reward stays a mystery — pick the date you want to cash it in, and she'll make it happen 😏
            </div>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.dim, marginBottom: 6 }}>
              Use it on…
            </div>
            <input
              type="date"
              value={claimDate}
              onChange={(e) => setClaimDate(e.target.value)}
              style={{
                width: "100%", boxSizing: "border-box", padding: 10, fontSize: 15, fontWeight: 700,
                border: `3px solid ${C.ink}`, borderRadius: 8, fontFamily: bodyFont, background: "#fff",
              }}
            />
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button
                onClick={() => setClaimTarget(null)}
                style={btn("#fff", C.dim, { flex: 1, borderColor: C.dim, boxShadow: "none" })}
              >
                Cancel
              </button>
              <button
                onClick={confirmClaim}
                style={btn(claimDate ? C.gold : C.dim, C.ink, { flex: 2 })}
              >
                Book it!
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Popup */}
      {popup && (
        <div
          style={{
            position: "fixed", inset: 0, background: "rgba(20,15,50,.8)",
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50,
          }}
          onClick={() => setPopup(null)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ ...panelStyle, padding: "28px 24px", maxWidth: 340, width: "100%", textAlign: "center", animation: "pop .35s ease-out" }}
          >
            <div style={{ fontFamily: pixelFont, fontSize: 13, color: popup.type === "down" ? C.red : popup.type === "achieve" || popup.type === "hidden" || popup.type === "gain" ? C.gold : C.pink, animation: "blink 1s step-end infinite" }}>
              {popup.type === "down" ? "▼ LEVEL DOWN... ▼" : popup.type === "achieve" ? "★ ACHIEVEMENT! ★" : popup.type === "hidden" ? "★ HIDDEN QUEST! ★" : popup.type === "gain" ? `★ ${popup.title} ★` : "★ LEVEL UP! ★"}
            </div>
            {popup.type === "achieve" || popup.type === "hidden" || popup.type === "gain" ? (
              <div style={{ fontSize: 30, margin: "14px 0" }}>{popup.type === "hidden" ? "✨" : popup.type === "gain" ? "🎰" : "🏆"}</div>
            ) : (
              <div style={{ fontFamily: pixelFont, fontSize: 34, margin: "14px 0", color: C.ink }}>
                LV {popup.level}
              </div>
            )}
            {popup.type === "down" ? (
              <div style={{ fontSize: 14, fontWeight: 700, color: C.dim, marginBottom: 18 }}>
                Level lost 💔 Behave better to earn it back
              </div>
            ) : popup.type === "hidden" ? (
              <div style={{ fontSize: 14, fontWeight: 700, color: C.dim, marginBottom: 18 }}>
                You just cleared a hidden quest… no telling which one 😏 Check your XP!
              </div>
            ) : popup.type === "gain" ? (
              <div style={{ fontSize: 15, fontWeight: 900, marginBottom: 18 }}>
                {popup.text}
              </div>
            ) : (
              <>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.dim, marginBottom: 6 }}>
                  {popup.type === "achieve" ? `Trophy earned: ${popup.name}` : "Reward unlocked"}
                </div>
                <div style={{ background: C.gold, border: `3px solid ${C.ink}`, borderRadius: 10, padding: "12px 14px", fontWeight: 900, fontSize: 16, marginBottom: 18 }}>
                  {popup.reward}
                </div>
              </>
            )}
            <button
              onClick={() => setPopup(null)}
              style={btn(popup.type === "down" ? C.red : C.pink, "#fff", { padding: "10px 24px", fontSize: 15, borderRadius: 10 })}
            >
              {popup.type === "down" ? "Noted… 😢" : "Let's go! 🎉"}
            </button>
          </div>
        </div>
      )}
    </>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<BrowniePoints />);
} catch (e) { window.__showErr("render: " + e.message); }
</script>
</body>
</html>
